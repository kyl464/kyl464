# ==========================================================================
#  📊 GitHub Metrics — Auto-generated profile infographics
#  Powered by: https://github.com/lowlighter/metrics
# ==========================================================================

name: Generate Metrics

on:
  # Run on every push to main
  push:
    branches: [main]
  # Run daily at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  #  Header Metrics (base profile overview)
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-header:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/header.svg
          user: kyl464
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta

  # ──────────────────────────────────────────────────────────────────────────
  #  Repositories — Pinned repos & notable contributions
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-repositories:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/repositories.svg
          user: kyl464
          template: classic
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: ""
          plugin_repositories_order: featured, pinned, starred, random

  # ──────────────────────────────────────────────────────────────────────────
  #  Languages — Most used languages across repos
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/languages.svg
          user: kyl464
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 10
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 10
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 30
          plugin_languages_recent_load: 500
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

  # ──────────────────────────────────────────────────────────────────────────
  #  Achievements — GitHub achievements & milestones
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-achievements:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/achievements.svg
          user: kyl464
          template: classic
          base: ""
          output_action: commit
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: no
          plugin_achievements_threshold: X

  # ──────────────────────────────────────────────────────────────────────────
  #  Habits — Coding habits & patterns
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/habits.svg
          user: kyl464
          template: classic
          base: ""
          output_action: commit
          plugin_habits: yes
          plugin_habits_charts: no
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

  # ──────────────────────────────────────────────────────────────────────────
  #  Contribution Calendar — Isometric contribution graph
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/isocalendar.svg
          user: kyl464
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

  # ──────────────────────────────────────────────────────────────────────────
  #  Stars — Recently starred repos
  # ──────────────────────────────────────────────────────────────────────────
  github-metrics-stars:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics/stars.svg
          user: kyl464
          template: classic
          base: ""
          plugin_stars: yes
          plugin_stars_limit: 4

  # ──────────────────────────────────────────────────────────────────────────
  #  WakaTime — Coding activity from WakaTime (optional)
